<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Get & Battle - Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Setup ---
        const firebaseConfig = {
            apiKey: "AIzaSyBtYoe3LVplo79NJdUY6TMsJDpXwAbgZXg",
            authDomain: "my-action-battle.firebaseapp.com",
            projectId: "my-action-battle",
            storageBucket: "my-action-battle.firebasestorage.app",
            messagingSenderId: "1078959278482",
            appId: "1:1078959278482:web:546f3aa44c451c426e994b"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "my-battle-app-v2";

        // --- Game State & Variables ---
        let user = null;
        let userName = "Player";
        let roomId = "";
        let playerSide = ""; 
        let winCount = 0;
        let leaderboard = [];

        let gameState = 'start';
        let playerX = 160;
        let fallSpeedLevel = 1; // 0: Easy, 1: Normal, 2: Hard
        let collectedCards = [];
        let obstacles = [];
        let items = [];
        let myCharacters = [];
        let selectedTeam = [];
        let enemies = [];
        let gameLoop;
        let frameCount = 0;
        let battleMode = 'auto'; 
        let isMyTurn = false;
        let currentRoomData = null;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CHAR_NAMES = ["Knight", "Mage", "Thief", "Dragon", "Elf", "Ogre", "Slime", "Hero", "Priest", "Angel"];
        const RANKS = ["B", "B", "B", "B", "A", "A", "S"];

        const screens = {
            start: document.getElementById('screen-start'),
            gacha: document.getElementById('screen-gacha'),
            formation: document.getElementById('screen-formation'),
            battle: document.getElementById('screen-battle'),
            matching: document.getElementById('screen-matching')
        };

        // --- Auth Initialization ---
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth Error", e);
            }
        };

        onAuthStateChanged(auth, (u) => { user = u; });
        initAuth();

        // --- Utilities ---
        function rand(n) { return Math.floor(Math.random() * n); }
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s && s.classList.add('hidden'));
            if (screenName && screens[screenName]) {
                screens[screenName].classList.remove('hidden');
                gameState = screenName;
            }
            if (screenName === 'start') updateLeaderboardUI();
        }

        function createCharacter(rank, ownerName = userName) {
            const name = CHAR_NAMES[rand(CHAR_NAMES.length)];
            const isHealer = name === "Priest" || name === "Angel" || (rank === 'S' && rand(3) === 0);
            let hp, atk;
            if (rank === 'S') { hp = 150 + rand(50); atk = 30 + rand(10); }
            else if (rank === 'A') { hp = 100 + rand(30); atk = 20 + rand(10); }
            else { hp = 60 + rand(20); atk = 10 + rand(10); }

            return { 
                id: Math.random().toString(36).substr(2, 9), 
                name, rank, hp, maxHp: hp, atk, owner: ownerName,
                type: isHealer ? 'healer' : 'attacker'
            };
        }

        // --- QUEST (MINI GAME) ---
        window.setSpeed = (lv) => {
            fallSpeedLevel = lv;
            document.querySelectorAll('.speed-btn').forEach((btn, i) => {
                btn.className = i === lv ? 'speed-btn px-3 py-1 bg-yellow-500 text-black text-xs font-bold rounded' : 'speed-btn px-3 py-1 bg-gray-700 text-white text-xs rounded';
            });
        };

        window.startGame = () => {
            const nameInput = document.getElementById('username-input');
            if (nameInput.value.trim()) userName = nameInput.value.trim();
            showScreen(null); 
            gameState = 'playing';
            playerX = canvas.width / 2 - 20;
            collectedCards = [];
            obstacles = [];
            items = [];
            frameCount = 0;
            if (gameLoop) cancelAnimationFrame(gameLoop);
            gameLoop = requestAnimationFrame(update);
        };

        function update() {
            if (gameState !== 'playing') return;
            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const baseSpeed = 3 + (fallSpeedLevel * 2);

            // Obstacle & Bomb Generation
            if (frameCount % Math.max(20, 60 - (fallSpeedLevel * 15)) === 0) {
                const isBomb = rand(5) === 0;
                obstacles.push({ x: rand(canvas.width - 30), y: -40, w: 30, h: 30, type: isBomb ? 'bomb' : 'block' });
            }
            if (frameCount % 100 === 0) items.push({ x: rand(canvas.width - 30), y: -40, rank: RANKS[rand(RANKS.length)] });

            // Draw Player
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(playerX, 420, 40, 40);
            ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
            ctx.fillText(userName, playerX + 20, 415);
            ctx.textAlign = 'left';

            // Draw Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.y += baseSpeed + (winCount * 0.2);
                
                if (o.type === 'bomb') {
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(o.x+15, o.y+15, 15, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#f59e0b'; ctx.fillRect(o.x+12, o.y-5, 6, 10);
                } else {
                    ctx.fillStyle = '#f87171'; ctx.fillRect(o.x, o.y, o.w, o.h);
                }

                if (playerX < o.x + o.w && playerX + 40 > o.x && 420 < o.y + 30 && 460 > o.y) {
                    if (o.type === 'bomb') {
                        if (collectedCards.length > 0) collectedCards.pop();
                        obstacles.splice(i, 1);
                        ctx.fillStyle = '#fbbf24'; ctx.fillRect(0,0,canvas.width,canvas.height); // Flash
                    } else {
                        endMiniGame(); return;
                    }
                }
                if (o.y > canvas.height) obstacles.splice(i, 1);
            }

            // Draw Items
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += baseSpeed * 0.8;
                ctx.fillStyle = item.rank === 'S' ? '#facc15' : (item.rank === 'A' ? '#f87171' : '#60a5fa');
                ctx.fillRect(item.x, item.y, 35, 45);
                ctx.strokeStyle = "#fff"; ctx.strokeRect(item.x, item.y, 35, 45);
                ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.fillText("RANK", item.x + 4, item.y + 15);
                ctx.font = "bold 16px Arial"; ctx.fillText(item.rank, item.x + 10, item.y + 35);

                if (playerX < item.x + 35 && playerX + 40 > item.x && 420 < item.y + 45 && 460 > item.y) {
                    collectedCards.push(item.rank); items.splice(i, 1);
                } else if (item.y > canvas.height) items.splice(i, 1);
            }

            ctx.fillStyle = '#fff'; ctx.font = '16px DotGothic16';
            ctx.fillText(`Cards: ${collectedCards.length}`, 10, 25);
            ctx.fillText(`Time: ${Math.floor((1200 - frameCount) / 60)}`, 280, 25);

            if (frameCount >= 1200) endMiniGame();
            else gameLoop = requestAnimationFrame(update);
        }

        function endMiniGame() {
            cancelAnimationFrame(gameLoop);
            showGacha();
        }

        // --- GACHA ---
        function showGacha() {
            showScreen('gacha');
            const resultDiv = document.getElementById('gacha-result');
            resultDiv.innerHTML = '';
            if (collectedCards.length === 0) collectedCards.push('B');
            collectedCards.forEach(rank => {
                const char = createCharacter(rank);
                myCharacters.push(char);
                const card = document.createElement('div');
                card.className = `p-2 bg-gray-800 border-2 border-gray-600 w-20 text-center text-[10px] rank-${rank} rounded`;
                card.innerHTML = `<span class="font-bold text-xs">RANK ${rank}</span><br>${char.name}<br>${char.type === 'healer' ? 'HEAL' : 'ATK'}:${char.atk}`;
                resultDiv.appendChild(card);
            });
        }

        // --- FORMATION ---
        window.showFormation = () => {
            showScreen('formation');
            renderCollection();
        };

        function renderCollection() {
            const list = document.getElementById('collection-list');
            list.innerHTML = '';
            myCharacters.forEach(char => {
                const isSelected = selectedTeam.some(t => t.id === char.id);
                const item = document.createElement('div');
                item.className = `p-1 cursor-pointer border-2 ${isSelected ? 'border-yellow-400 bg-gray-700' : 'border-transparent bg-gray-900'} text-[10px] rounded`;
                item.innerHTML = `<span class="rank-${char.rank} font-bold">RANK ${char.rank}</span><br>${char.name} (${char.type === 'healer' ? '癒' : '攻'})<br>HP:${char.hp}<br>ATK:${char.atk}`;
                item.onclick = () => {
                    const idx = selectedTeam.findIndex(t => t.id === char.id);
                    if (idx > -1) selectedTeam.splice(idx, 1);
                    else if (selectedTeam.length < 3) selectedTeam.push(char);
                    renderCollection();
                };
                list.appendChild(item);
            });
            document.getElementById('battle-btn').disabled = selectedTeam.length === 0;
        }

        window.autoForm = () => {
            selectedTeam = [...myCharacters].sort((a, b) => (b.atk + b.hp) - (a.atk + a.hp)).slice(0, 3);
            renderCollection();
        };

        // --- BATTLE CONTROL ---
        window.startBattle = async () => {
            battleMode = document.querySelector('input[name="battleMode"]:checked').value;
            if (battleMode === 'multi') {
                roomId = document.getElementById('room-id-input').value.trim();
                if (!roomId) { log("Room IDを入力してください"); return; }
                showScreen('matching');
                await startMultiplayer();
            } else {
                showScreen('battle');
                runSoloBattle();
            }
        };

        // --- MULTIPLAYER ---
        async function startMultiplayer() {
            if (!user) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            const snap = await getDoc(roomRef);
            if (!snap.exists()) {
                playerSide = 'p1';
                await setDoc(roomRef, { p1: { team: selectedTeam, uid: user.uid, name: userName, ready: true }, p2: null, turn: 'p1', lastAction: null, status: 'waiting' });
            } else {
                playerSide = 'p2';
                await updateDoc(roomRef, { p2: { team: selectedTeam, uid: user.uid, name: userName, ready: true }, status: 'playing' });
            }
            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                currentRoomData = data;
                if (data.status === 'playing' && gameState === 'matching') showScreen('battle');
                if (data.status === 'playing') syncMultiBattle(data);
            });
        }

        function syncMultiBattle(data) {
            isMyTurn = (data.turn === playerSide);
            updateMultiUI(data);
            if (data.lastAction && data.lastAction.by !== playerSide) log(data.lastAction.msg);
            const myTeam = data[playerSide].team;
            const enemyTeam = data[playerSide === 'p1' ? 'p2' : 'p1']?.team || [];
            if (enemyTeam.length > 0 && (myTeam.every(c => c.hp <= 0) || enemyTeam.every(c => c.hp <= 0))) finishBattle(enemyTeam.every(c => c.hp <= 0));
        }

        function updateMultiUI(data) {
            const otherSide = playerSide === 'p1' ? 'p2' : 'p1';
            const myTeam = data[playerSide].team;
            const enemyTeam = data[otherSide]?.team || [];
            const otherName = data[otherSide]?.name || "Unknown";
            const pUI = document.getElementById('player-team-ui');
            const eUI = document.getElementById('enemy-team-ui');
            pUI.innerHTML = ''; eUI.innerHTML = '';

            const createCardUI = (c, isEnemy) => {
                const div = document.createElement('div');
                const isDead = c.hp <= 0;
                div.className = `w-20 p-1 bg-gray-800 border-2 ${isDead ? 'opacity-30 border-gray-900' : 'border-gray-500'} text-[10px] text-center rounded relative`;
                if (!isDead && isMyTurn) {
                    div.classList.add('target-glow');
                    div.onclick = () => performMultiAction(c, isEnemy);
                }
                const statLabel = c.type === 'healer' ? 'HEAL' : 'ATK';
                div.innerHTML = `<span class="rank-${c.rank} font-bold">RANK ${c.rank}</span><br>${c.name}<br>HP:${Math.max(0, Math.floor(c.hp))}<br>${statLabel}:${c.atk}`;
                return div;
            };

            myTeam.forEach(c => pUI.appendChild(createCardUI(c, false)));
            enemyTeam.forEach(c => eUI.appendChild(createCardUI(c, true)));
            document.getElementById('battle-header').innerText = isMyTurn ? `あなたのターン (${userName})` : `${otherName}のターン待機中...`;
        }

        async function performMultiAction(target, isEnemyTarget) {
            if (!isMyTurn) return;
            const otherSide = playerSide === 'p1' ? 'p2' : 'p1';
            const myTeam = [...currentRoomData[playerSide].team];
            const enemyTeam = [...currentRoomData[otherSide].team];
            const aliveMy = myTeam.filter(c => c.hp > 0);
            const actor = aliveMy[rand(aliveMy.length)];

            let msg = "";
            if (actor.type === 'healer') {
                if (isEnemyTarget) { log("回復役は味方を選択してください"); return; }
                const targetIdx = myTeam.findIndex(c => c.id === target.id);
                myTeam[targetIdx].hp = Math.min(myTeam[targetIdx].maxHp, myTeam[targetIdx].hp + actor.atk);
                msg = `${userName}の${actor.name}が${target.name}を回復！`;
            } else {
                if (!isEnemyTarget) { log("攻撃役は敵を選択してください"); return; }
                const targetIdx = enemyTeam.findIndex(c => c.id === target.id);
                enemyTeam[targetIdx].hp -= actor.atk;
                msg = `${userName}の${actor.name}の攻撃！ ${actor.atk}ダメ`;
            }

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            await updateDoc(roomRef, {
                [playerSide]: { ...currentRoomData[playerSide], team: myTeam },
                [otherSide]: { ...currentRoomData[otherSide], team: enemyTeam },
                turn: otherSide,
                lastAction: { by: playerSide, msg }
            });
            log(msg);
        }

        // --- SOLO BATTLE ---
        function runSoloBattle() {
            enemies = [createCharacter('B', 'CPU'), createCharacter('A', 'CPU'), createCharacter('S', 'CPU')].slice(0, selectedTeam.length);
            selectedTeam.forEach(c => c.hp = c.maxHp);
            if (battleMode === 'auto') runAutoBattle();
            else startSoloPlayerTurn();
        }

        function runAutoBattle() {
            const turnInterval = setInterval(() => {
                const pAlive = selectedTeam.filter(c => c.hp > 0);
                const eAlive = enemies.filter(c => c.hp > 0);
                if (pAlive.length === 0 || eAlive.length === 0) { clearInterval(turnInterval); finishBattle(eAlive.length === 0); return; }
                
                const isP = rand(2) === 0;
                const side = isP ? selectedTeam : enemies;
                const other = isP ? enemies : selectedTeam;
                const aliveSide = side.filter(c => c.hp > 0);
                const aliveOther = other.filter(c => c.hp > 0);
                
                const actor = aliveSide[rand(aliveSide.length)];
                if (actor.type === 'healer') {
                    const target = aliveSide[rand(aliveSide.length)];
                    target.hp = Math.min(target.maxHp, target.hp + actor.atk);
                    log(`${isP ? userName : 'CPU'}の${actor.name}が回復！`);
                } else {
                    const target = aliveOther[rand(aliveOther.length)];
                    target.hp -= actor.atk;
                    log(`${isP ? userName : 'CPU'}の${actor.name}が攻撃！`);
                }
                updateSoloUI();
            }, 800);
        }

        function startSoloPlayerTurn() {
            if (selectedTeam.every(c => c.hp <= 0) || enemies.every(c => c.hp <= 0)) {
                finishBattle(enemies.every(c => c.hp <= 0)); return;
            }
            isMyTurn = true; log("あなたのターン：対象を選択"); updateSoloUI();
        }

        function updateSoloUI() {
            const pUI = document.getElementById('player-team-ui');
            const eUI = document.getElementById('enemy-team-ui');
            pUI.innerHTML = ''; eUI.innerHTML = '';
            const createCardUI = (c, isEnemy) => {
                const div = document.createElement('div');
                const isDead = c.hp <= 0;
                div.className = `w-20 p-1 bg-gray-800 border-2 ${isDead ? 'opacity-30 border-gray-900' : 'border-gray-500'} text-[10px] text-center rounded`;
                if (!isDead && isMyTurn) {
                    div.classList.add('target-glow');
                    div.onclick = () => {
                        const aliveP = selectedTeam.filter(c => c.hp > 0);
                        const actor = aliveP[rand(aliveP.length)];
                        if (actor.type === 'healer' && isEnemy) return;
                        if (actor.type === 'attacker' && !isEnemy) return;
                        
                        isMyTurn = false;
                        if (actor.type === 'healer') {
                            c.hp = Math.min(c.maxHp, c.hp + actor.atk);
                            log(`味方を回復！ +${actor.atk}`);
                        } else {
                            c.hp -= actor.atk;
                            log(`敵に攻撃！ -${actor.atk}`);
                        }
                        updateSoloUI();
                        setTimeout(() => {
                            const eAlive = enemies.filter(c => c.hp > 0);
                            if (eAlive.length > 0) {
                                const eActor = eAlive[rand(eAlive.length)];
                                if (eActor.type === 'healer') {
                                    const target = eAlive[rand(eAlive.length)];
                                    target.hp = Math.min(target.maxHp, target.hp + eActor.atk);
                                    log(`敵CPUが回復！`);
                                } else {
                                    const target = selectedTeam.filter(c => c.hp > 0)[rand(selectedTeam.filter(c => c.hp > 0).length)];
                                    target.hp -= eActor.atk;
                                    log(`敵CPUが反撃！`);
                                }
                                updateSoloUI(); setTimeout(startSoloPlayerTurn, 600);
                            } else finishBattle(true);
                        }, 600);
                    };
                }
                const statLabel = c.type === 'healer' ? 'HEAL' : 'ATK';
                div.innerHTML = `<span class="rank-${c.rank} font-bold">RANK ${c.rank}</span><br>${c.name}<br>HP:${Math.max(0, Math.floor(c.hp))}<br>${statLabel}:${c.atk}`;
                return div;
            };
            selectedTeam.forEach(c => pUI.appendChild(createCardUI(c, false)));
            enemies.forEach(c => eUI.appendChild(createCardUI(c, true)));
        }

        function log(msg) {
            const l = document.getElementById('battle-log');
            if (l) { l.innerHTML += msg + '<br>'; l.scrollTop = l.scrollHeight; }
        }

        function finishBattle(isWin) {
            isMyTurn = false;
            const finishBtn = document.getElementById('battle-finish-btn');
            if (isWin) { winCount++; document.getElementById('top-score').innerText = `WINS: ${winCount}`; log("VICTORY!"); }
            else { saveToLeaderboard(userName, winCount); winCount = 0; document.getElementById('top-score').innerText = `WINS: 0`; log("DEFEAT..."); }
            finishBtn.classList.remove('hidden');
        }

        function saveToLeaderboard(name, score) {
            if (score > 0) {
                const existing = leaderboard.findIndex(l => l.name === name);
                if (existing > -1) {
                    if (leaderboard[existing].score < score) leaderboard[existing].score = score;
                } else {
                    leaderboard.push({ name, date: new Date().toLocaleTimeString(), score });
                }
                leaderboard.sort((a, b) => b.score - a.score);
                leaderboard = leaderboard.slice(0, 5);
            }
        }

        function updateLeaderboardUI() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = leaderboard.length === 0 ? "記録なし" : leaderboard.map((entry, i) => `<div class="flex justify-between border-b border-gray-700 py-1"><span>${i+1}. ${entry.name}</span><span class="text-yellow-400 font-bold">${entry.score} Wins</span></div>`).join('');
        }

        window.resetGame = async () => {
            if (roomId) {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                await deleteDoc(roomRef).catch(() => {});
                roomId = "";
            }
            showScreen('start');
            selectedTeam = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        window.addEventListener('keydown', e => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft') playerX = Math.max(0, playerX - 30);
            if (e.key === 'ArrowRight') playerX = Math.min(canvas.width - 40, playerX + 30);
        });
        canvas.addEventListener('touchstart', e => {
            if (gameState !== 'playing') return;
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            playerX = touchX < canvas.width / 2 ? Math.max(0, playerX - 45) : Math.min(canvas.width - 40, playerX + 45);
        });

        window.onload = () => showScreen('start');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { font-family: 'DotGothic16', sans-serif; background: #111; color: white; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #1a1a1a; touch-action: none; border: 4px solid #444; }
        .rank-S { color: #facc15; text-shadow: 0 0 10px #facc15; }
        .rank-A { color: #f87171; }
        .rank-B { color: #60a5fa; }
        .target-glow { animation: glow 1s infinite alternate; cursor: pointer; }
        @keyframes glow { from { border-color: #ff0000; box-shadow: 0 0 5px #f00; } to { border-color: #fff; box-shadow: 0 0 15px #fff; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div id="ui-container" class="w-full max-w-md p-2 flex flex-col items-center">
        <div class="flex justify-between w-full items-center mb-2 px-2">
            <h1 class="text-xl text-yellow-400">QUEST & BATTLE v2</h1>
            <div id="top-score" class="text-xs bg-gray-800 px-2 py-1 rounded">WINS: 0</div>
        </div>
        
        <div id="game-container" class="relative">
            <canvas id="gameCanvas" width="360" height="500"></canvas>
            
            <!-- Start Screen -->
            <div id="screen-start" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 p-6">
                <h2 class="text-xl text-yellow-500 mb-2">BATTLE READY</h2>
                <div class="w-full mb-4">
                    <input id="username-input" type="text" maxlength="10" placeholder="Player Name" class="w-full p-2 text-black rounded text-sm text-center">
                </div>
                
                <div class="mb-6 w-full text-center">
                    <p class="text-[10px] text-gray-400 mb-2">FALL SPEED</p>
                    <div class="flex justify-center gap-2">
                        <button onclick="setSpeed(0)" class="speed-btn px-3 py-1 bg-gray-700 text-white text-xs rounded">EASY</button>
                        <button onclick="setSpeed(1)" class="speed-btn px-3 py-1 bg-yellow-500 text-black text-xs font-bold rounded">NORMAL</button>
                        <button onclick="setSpeed(2)" class="speed-btn px-3 py-1 bg-gray-700 text-white text-xs rounded">HARD</button>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full px-6 py-3 bg-green-600 text-white hover:bg-green-500 font-bold mb-4 rounded">START QUEST</button>
                <div id="leaderboard" class="w-full bg-gray-900/80 p-3 rounded text-[10px]">
                    <h3 class="text-center text-yellow-500 mb-1 underline">TOP RECORDS</h3>
                    <div id="leaderboard-list">記録なし</div>
                </div>
            </div>

            <!-- Gacha Screen -->
            <div id="screen-gacha" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90">
                <h2 class="text-xl mb-4 text-yellow-400">NEW ALLIES</h2>
                <div id="gacha-result" class="flex flex-wrap justify-center gap-2 mb-6"></div>
                <button onclick="showFormation()" class="px-8 py-2 bg-blue-600 text-white font-bold rounded">GO TO TEAM</button>
            </div>

            <!-- Formation Screen -->
            <div id="screen-formation" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90 p-4">
                <h2 class="text-lg mb-2 text-blue-300">TEAM SELECT</h2>
                <div id="collection-list" class="grid grid-cols-3 gap-2 w-full max-h-48 overflow-y-auto mb-4 bg-gray-800 p-2 border border-gray-600"></div>
                
                <div class="bg-gray-700/50 p-2 rounded mb-4 w-full text-center border border-gray-600">
                    <div class="flex justify-center gap-4 text-xs mb-2">
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="auto" checked> AUTO</label>
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="manual"> SOLO</label>
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="multi"> MULTI</label>
                    </div>
                    <input id="room-id-input" type="text" placeholder="Room ID" class="w-full p-1 text-black text-[10px] rounded">
                </div>

                <div class="flex gap-2 w-full">
                    <button onclick="autoForm()" class="flex-1 py-2 bg-gray-600 text-white font-bold text-xs rounded">AUTO FILL</button>
                    <button id="battle-btn" onclick="startBattle()" class="flex-1 py-2 bg-red-600 text-white hover:bg-red-500 font-bold disabled:opacity-50 text-xs rounded">START BATTLE</button>
                </div>
            </div>

            <!-- Matching Screen -->
            <div id="screen-matching" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90">
                <div class="animate-bounce text-yellow-400 text-xl">WAITING OPPONENT...</div>
                <button onclick="resetGame()" class="mt-8 text-xs text-gray-400 underline">CANCEL</button>
            </div>

            <!-- Battle Screen -->
            <div id="screen-battle" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/80">
                <div id="battle-header" class="text-center mb-2 text-yellow-400 font-bold text-sm"></div>
                <div class="flex flex-col gap-2 w-full px-2">
                    <div id="enemy-team-ui" class="flex justify-center gap-2"></div>
                    <div class="text-center text-white/20 text-xs font-bold italic tracking-widest">VERSUS</div>
                    <div id="player-team-ui" class="flex justify-center gap-2"></div>
                </div>
                <div id="battle-log" class="text-[9px] h-24 overflow-y-auto w-full px-4 text-gray-400 mt-4 bg-black/40 py-2"></div>
                <button id="battle-finish-btn" onclick="resetGame()" class="hidden mt-4 px-8 py-2 bg-yellow-500 text-black font-bold rounded">CONTINUE</button>
            </div>
        </div>

        <p class="mt-4 text-[10px] text-gray-500 text-center">BOMBS (BLACK) REDUCE CARDS!<br>HEALERS (ANGEL/PRIEST) RESTORE TEAM HP!</p>
    </div>

</body>
</html>
