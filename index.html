<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Character Get & Battle - Expert Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, getDoc, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : "my-battle-app-v4";

        function initFirebase() {
            if (db) return true;
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!configStr) return false;
                const firebaseConfig = JSON.parse(configStr);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                onAuthStateChanged(auth, (u) => { 
                    user = u;
                    if (u) loadUserData();
                });
                const startAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(console.error);
                    } else {
                        await signInAnonymously(auth).catch(console.error);
                    }
                };
                startAuth();
                return true;
            } catch (e) { console.error("Firebase Init Error:", e); return false; }
        }
        initFirebase();
        
        // --- Game Variables ---
        let user = null;
        let userName = localStorage.getItem('pName') || "Player";
        let winCount = 0;
        let totalCoins = 0;
        let upgrades = { atk: 0, hp: 0 };
        let gameState = 'start';
        let playerX = 160;
        let targetX = 160; 
        let difficultyLevel = 1; 
        let collectedCards = [];
        let collectedCoins = 0;
        let items = []; 
        let obstacles = []; 
        let myCharacters = JSON.parse(localStorage.getItem('myChars')) || [];
        let selectedTeam = [];
        let enemies = [];
        let gameLoop;
        let frameCount = 0;
        let battleMode = 'auto'; 
        let isMyTurn = false;
        let selectedActorIdx = -1; 
        let currentTurnCount = 0;
        const MAX_TURNS = 20;

        let roomId = "";
        let playerRole = ""; 
        let unsubscribeRoom = null;
        let fullRoomData = null;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CHAR_NAMES = ["Knight", "Mage", "Thief", "Dragon", "Elf", "Ogre", "Slime", "Hero", "Priest", "Angel"];
        const RANKS = ["B", "B", "B", "B", "A", "A", "S"];

        const screens = {
            start: document.getElementById('screen-start'),
            gacha: document.getElementById('screen-gacha'),
            formation: document.getElementById('screen-formation'),
            battle: document.getElementById('screen-battle'),
            matching: document.getElementById('screen-matching'),
            difficulty: document.getElementById('screen-difficulty'),
            shop: document.getElementById('screen-shop'),
            titles: document.getElementById('screen-titles')
        };

        // --- Persistence ---
        async function loadUserData() {
            if (!user) return;
            const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                const data = snap.data();
                winCount = data.winCount || 0;
                totalCoins = data.totalCoins || 0;
                upgrades = data.upgrades || { atk: 0, hp: 0 };
                updateMainUI();
            }
        }

        async function saveUserData() {
            if (!user) return;
            const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
            await setDoc(userRef, { winCount, totalCoins, upgrades }, { merge: true });
            updateMainUI();
        }

        function updateMainUI() {
            const scoreDisp = document.getElementById('top-score');
            if (scoreDisp) scoreDisp.innerText = `WINS: ${winCount} | 🪙 ${totalCoins}`;
            const titleDisp = document.getElementById('player-title');
            if (titleDisp) titleDisp.innerText = getTitle().text;
        }

        const TITLE_LIST = [
            { text: "👑不敗の覇者", condition: "通算50勝以上", check: () => winCount >= 50 },
            { text: "⚔️ベテラン騎士", condition: "通算20勝以上", check: () => winCount >= 20 },
            { text: "💰大富豪", condition: "所持金1000コイン以上", check: () => totalCoins >= 1000 },
            { text: "🛡️究極超人", condition: "攻撃・HPの両方を強化済み", check: () => upgrades.atk && upgrades.hp },
            { text: "🐣駆け出し冒険者", condition: "初期状態", check: () => true }
        ];

        function getTitle() {
            return TITLE_LIST.find(t => t.check()) || TITLE_LIST[TITLE_LIST.length - 1];
        }

        function rand(n) { return Math.floor(Math.random() * n); }
        
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s && s.classList.add('hidden'));
            if (screenName && screens[screenName]) {
                screens[screenName].classList.remove('hidden');
                gameState = screenName;
            }
            if (screenName === 'formation') renderCollection();
            if (screenName === 'battle') {
                const logEl = document.getElementById('battle-log');
                if (logEl) logEl.innerHTML = '';
                log("バトル開始！");
            }
            if (screenName === 'shop') renderShop();
            if (screenName === 'titles') renderTitles();
            if (screenName === null) gameState = 'playing';
            
            // 画面遷移時にUIを最新の状態にする
            updateMainUI();
        }

        function createCharacter(rank, ownerName = userName) {
            const name = CHAR_NAMES[rand(CHAR_NAMES.length)];
            const isHealer = name === "Priest" || name === "Angel" || (rank === 'S' && rand(3) === 0);
            let hp, atk;
            let maxMp = 0;

            if (rank === 'S') { hp = 150 + rand(50); atk = 30 + rand(10); maxMp = 3; }
            else if (rank === 'A') { hp = 100 + rand(30); atk = 20 + rand(10); maxMp = 2; }
            else { hp = 60 + rand(20); atk = 10 + rand(10); maxMp = 1; }

            if (upgrades.atk) atk += 10;
            if (upgrades.hp) hp += 30;

            return { 
                id: Math.random().toString(36).substr(2, 9), 
                name, rank, hp, maxHp: hp, atk, owner: ownerName,
                type: isHealer ? 'healer' : 'attacker',
                currentHp: hp,
                maxHp: hp,
                maxMp: isHealer ? maxMp : 0,
                mp: isHealer ? maxMp : 0
            };
        }

        window.openDifficultySelect = () => {
            const nameInput = document.getElementById('username-input');
            if (nameInput && nameInput.value.trim()) {
                userName = nameInput.value.trim();
                localStorage.setItem('pName', userName);
            }
            showScreen('difficulty');
        };

        window.startQuest = (lv) => {
            difficultyLevel = lv;
            showScreen(null); 
            gameState = 'playing';
            playerX = canvas.width / 2 - 20;
            targetX = playerX;
            collectedCards = []; items = []; obstacles = []; collectedCoins = 0; frameCount = 0;
            if (gameLoop) cancelAnimationFrame(gameLoop);
            gameLoop = requestAnimationFrame(update);
        };

        function update() {
            if (gameState !== 'playing') return;
            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            playerX += (targetX - playerX) * 0.3;
            const baseSpeed = 4 + (difficultyLevel * 2.5);
            const spawnInterval = Math.max(15, 45 - (difficultyLevel * 10));

            if (frameCount % spawnInterval === 0) obstacles.push({ x: rand(canvas.width - 30), y: -40, w: 30, h: 30 });
            if (frameCount % 80 === 0) items.push({ type: 'card', x: rand(canvas.width - 30), y: -40, rank: RANKS[rand(RANKS.length)] });
            if (frameCount % 40 === 0) items.push({ type: 'coin', x: rand(canvas.width - 20), y: -40 });
            
            ctx.fillStyle = '#4ade80'; 
            ctx.fillRect(playerX, 420, 40, 40);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i]; o.y += baseSpeed;
                ctx.fillStyle = '#f87171'; 
                ctx.fillRect(o.x, o.y, o.w, o.h);
                if (playerX < o.x + o.w && playerX + 40 > o.x && 420 < o.y + o.h && 460 > o.y) { endQuest(); return; }
                if (o.y > canvas.height) obstacles.splice(i, 1);
            }
            
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i]; item.y += baseSpeed * 0.8;
                if (item.type === 'coin') {
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath(); ctx.arc(item.x + 10, item.y + 10, 10, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
                    ctx.fillText("$", item.x+10, item.y+14);
                } else {
                    ctx.fillStyle = item.rank === 'S' ? '#facc15' : (item.rank === 'A' ? '#f87171' : '#60a5fa');
                    ctx.fillRect(item.x, item.y, 30, 40);
                    ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.fillText(item.rank, item.x + 15, item.y + 25);
                }
                if (playerX < item.x + 30 && playerX + 40 > item.x && 420 < item.y + 40 && 460 > item.y) {
                    if (item.type === 'coin') {
                        collectedCoins += 10;
                    } else {
                        collectedCards.push(item.rank);
                    }
                    items.splice(i, 1);
                } else if (item.y > canvas.height) items.splice(i, 1);
            }
            if (frameCount >= 1500) endQuest(); else gameLoop = requestAnimationFrame(update);
        }

        async function endQuest() { 
            cancelAnimationFrame(gameLoop); 
            totalCoins += collectedCoins;
            // 重要な修正：値を更新した直後に保存し、UIに反映させる
            await saveUserData();
            showGacha(); 
        }

        function showGacha() {
            showScreen('gacha');
            const resultDiv = document.getElementById('gacha-result');
            resultDiv.innerHTML = '';
            if (collectedCards.length === 0) collectedCards.push('B');
            collectedCards.forEach(rank => {
                const char = createCharacter(rank);
                myCharacters.push(char);
                const card = document.createElement('div');
                card.className = `p-2 bg-gray-800 border-2 border-gray-600 w-20 text-center text-[10px] rank-${rank} rounded shadow-lg`;
                card.innerHTML = `<span class="font-bold text-xs">RANK ${rank}</span><br>${char.name}<br>${char.type === 'healer' ? '💖' : '⚔️'}`;
                resultDiv.appendChild(card);
            });
            localStorage.setItem('myChars', JSON.stringify(myCharacters));
            document.getElementById('quest-coins').innerText = `獲得コイン: +${collectedCoins}`;
            updateMainUI(); // 表示を最新に
        }

        window.goToBattleMode = () => { showScreen('formation'); };

        function renderCollection() {
            const list = document.getElementById('collection-list');
            if (!list) return;
            list.innerHTML = '';
            myCharacters.forEach(char => {
                const isSelected = selectedTeam.some(t => t.id === char.id);
                const item = document.createElement('div');
                item.className = `p-1 cursor-pointer border-2 ${isSelected ? 'border-yellow-400 bg-gray-700' : 'border-gray-800 bg-gray-900'} text-[10px] rounded`;
                item.innerHTML = `<span class="rank-${char.rank} font-bold">RANK ${char.rank}</span><br>${char.name}<br>${char.type === 'healer' ? '💖 癒' : '⚔️ 攻'}<br>HP:${char.hp} ATK:${char.atk}`;
                item.onclick = () => {
                    const idx = selectedTeam.findIndex(t => t.id === char.id);
                    if (idx > -1) { selectedTeam.splice(idx, 1); } 
                    else if (selectedTeam.length < 3) { selectedTeam.push({...char, currentHp: char.hp, maxHp: char.hp, mp: char.maxMp}); }
                    renderCollection();
                };
                list.appendChild(item);
            });
            const bBtn = document.getElementById('battle-btn');
            if (bBtn) bBtn.disabled = selectedTeam.length === 0;
        }

        window.openShop = () => showScreen('shop');
        
        function renderShop() {
            const list = document.getElementById('shop-items');
            list.innerHTML = '';
            const goods = [
                { key: 'atk', name: '全キャラ攻撃力+10', cost: 300, desc: '永続的なパワーアップ' },
                { key: 'hp', name: '全キャラ最大HP+30', cost: 300, desc: '永続的な耐久アップ' }
            ];
            goods.forEach(item => {
                const div = document.createElement('div');
                const purchased = upgrades[item.key] === 1;
                div.className = `p-3 bg-gray-800 border-2 ${purchased ? 'border-green-500' : 'border-gray-600'} rounded`;
                div.innerHTML = `
                    <div class="text-sm font-bold">${item.name}</div>
                    <div class="text-[10px] text-gray-400 mb-2">${item.desc}</div>
                    <button ${purchased || totalCoins < item.cost ? 'disabled' : ''} 
                        onclick="buyUpgrade('${item.key}', ${item.cost})"
                        class="w-full py-1 text-xs font-bold rounded ${purchased ? 'bg-gray-600' : 'bg-yellow-600'}">
                        ${purchased ? '強化済み' : `🪙 ${item.cost}で購入`}
                    </button>
                `;
                list.appendChild(div);
            });
        }

        window.buyUpgrade = async (key, cost) => {
            if (totalCoins >= cost && !upgrades[key]) {
                totalCoins -= cost;
                upgrades[key] = 1;
                myCharacters.forEach(c => {
                    if (key === 'atk') c.atk += 10;
                    if (key === 'hp') { c.hp += 30; c.maxHp += 30; }
                });
                localStorage.setItem('myChars', JSON.stringify(myCharacters));
                await saveUserData();
                renderShop();
            }
        };

        window.openTitles = () => showScreen('titles');
        function renderTitles() {
            const list = document.getElementById('title-list');
            list.innerHTML = '';
            TITLE_LIST.forEach(t => {
                const unlocked = t.check();
                const div = document.createElement('div');
                div.className = `p-2 border-b border-gray-700 flex justify-between items-center ${unlocked ? 'opacity-100' : 'opacity-40'}`;
                div.innerHTML = `
                    <div>
                        <div class="text-sm ${unlocked ? 'text-yellow-400 font-bold' : 'text-gray-400'}">${t.text}</div>
                        <div class="text-[9px] text-gray-500">${t.condition}</div>
                    </div>
                    <div>${unlocked ? '✅' : '🔒'}</div>
                `;
                list.appendChild(div);
            });
        }

        window.startBattleAction = async () => {
            currentTurnCount = 1;
            selectedActorIdx = -1;
            const modeInput = document.querySelector('input[name="battleMode"]:checked');
            battleMode = modeInput ? modeInput.value : 'auto';
            roomId = document.getElementById('room-id-input').value.trim();

            if (battleMode === 'multi') {
                if (!roomId) { alert("ルームキーを入力してください"); return; }
                const isReady = initFirebase();
                if (!isReady) { alert("準備中..."); return; }
                showScreen('matching');
                joinMultiplayerRoom();
            } else {
                showScreen('battle');
                runSoloBattle();
            }
        };

        async function joinMultiplayerRoom() {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            const snap = await getDoc(roomRef);
            if (!snap.exists()) {
                playerRole = "p1";
                await setDoc(roomRef, { p1: { name: userName, team: selectedTeam, uid: user.uid }, p2: null, turn: 1, status: "waiting" });
            } else {
                playerRole = "p2";
                await updateDoc(roomRef, { p2: { name: userName, team: selectedTeam, uid: user.uid }, status: "ready" });
            }
            unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
                const data = docSnap.data();
                if (data && data.status === "ready" && gameState !== 'battle') {
                    showScreen('battle');
                    syncFromDatabase(data);
                    startMultiTurn();
                } else if (data && gameState === 'battle') { syncFromDatabase(data); }
            }, (err) => console.error("Room Sync Error:", err));
        }

        function syncFromDatabase(data) {
            fullRoomData = data;
            currentTurnCount = data.turn;
            if (playerRole === "p1") {
                selectedTeam = data.p1.team; enemies = data.p2 ? data.p2.team : [];
            } else {
                selectedTeam = data.p2.team; enemies = data.p1.team;
            }
            updateBattleUI();
            checkWinCondition();
        }

        function startMultiTurn() {
            if (checkWinCondition()) return;
            isMyTurn = true;
            log(`ターン ${currentTurnCount}: 行動選択...`);
            updateBattleUI();
        }

        async function sendAction(actorIdx, targetIdx, isEnemyTarget) {
            isMyTurn = false;
            const actionRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId, 'actions', `${currentTurnCount}_${playerRole}`);
            await setDoc(actionRef, { role: playerRole, actorIdx, targetIdx, isEnemyTarget });
            checkBothActionsDone();
        }

        async function checkBothActionsDone() {
            const p1ActRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId, 'actions', `${currentTurnCount}_p1`);
            const p2ActRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId, 'actions', `${currentTurnCount}_p2`);
            const [s1, s2] = await Promise.all([getDoc(p1ActRef), getDoc(p2ActRef)]);
            if (s1.exists() && s2.exists()) {
                if (playerRole === "p1") {
                    const p1Team = fullRoomData.p1.team;
                    const p2Team = fullRoomData.p2.team;
                    const process = (act, actorSide, oppSide) => {
                        const actor = actorSide[act.actorIdx];
                        if (!actor || actor.currentHp <= 0) return;
                        const target = act.isEnemyTarget ? oppSide[act.targetIdx] : actorSide[act.targetIdx];
                        if (!target) return;
                        if (actor.type === 'healer' && actor.mp > 0) {
                            target.currentHp = Math.min(target.maxHp, target.currentHp + actor.atk); actor.mp--;
                        } else { target.currentHp = Math.max(0, target.currentHp - actor.atk); }
                    };
                    process(s1.data(), p1Team, p2Team);
                    process(s2.data(), p2Team, p1Team);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { "p1.team": p1Team, "p2.team": p2Team, turn: currentTurnCount + 1 });
                }
                setTimeout(startMultiTurn, 1000);
            }
        }

        function runSoloBattle() {
            enemies = [createCharacter('B', 'CPU'), createCharacter('A', 'CPU'), createCharacter('S', 'CPU')].slice(0, selectedTeam.length);
            selectedTeam.forEach(c => { c.currentHp = c.maxHp; c.mp = c.maxMp; });
            if (battleMode === 'auto') runAutoBattle(); else startSoloTurn();
        }

        function runAutoBattle() {
            const interval = setInterval(() => {
                if (checkWinCondition() || gameState !== 'battle') { clearInterval(interval); return; }
                const isP = rand(2) === 0;
                const side = isP ? selectedTeam : enemies;
                const opp = isP ? enemies : selectedTeam;
                const aliveSide = side.filter(c => c.currentHp > 0);
                if (aliveSide.length === 0) return;
                const actor = aliveSide[rand(aliveSide.length)];
                const aliveOpp = opp.filter(c => c.currentHp > 0);
                
                if (actor.type === 'healer' && actor.mp > 0) {
                    const target = aliveSide[rand(aliveSide.length)];
                    target.currentHp = Math.min(target.maxHp, target.currentHp + actor.atk);
                    actor.mp--; log(`${actor.owner}の癒し！`);
                } else if (aliveOpp.length > 0) {
                    const target = aliveOpp[rand(aliveOpp.length)];
                    target.currentHp = Math.max(0, target.currentHp - actor.atk);
                    log(`${actor.owner}の攻撃！`);
                }
                currentTurnCount++;
                updateBattleUI();
            }, 800);
        }

        function startSoloTurn() { 
            if (checkWinCondition()) return; 
            isMyTurn = true; 
            selectedActorIdx = -1; 
            updateBattleUI(); 
        }

        function checkWinCondition() {
            const pAlive = selectedTeam.filter(c => c.currentHp > 0);
            const eAlive = enemies.filter(c => c.currentHp > 0);
            if (eAlive.length === 0 && enemies.length > 0) { finishBattle(true); return true; }
            if (pAlive.length === 0 && selectedTeam.length > 0) { finishBattle(false); return true; }
            if (currentTurnCount >= MAX_TURNS) { finishBattle(true); return true; }
            return false;
        }

        function updateBattleUI() {
            const pUI = document.getElementById('player-team-ui');
            const eUI = document.getElementById('enemy-team-ui');
            const guide = document.getElementById('battle-guide');
            if (!pUI || !eUI) return;
            pUI.innerHTML = ''; eUI.innerHTML = '';
            document.getElementById('battle-header').innerText = `TURN ${currentTurnCount} / ${MAX_TURNS}`;

            if (isMyTurn) {
                guide.innerText = selectedActorIdx === -1 ? "★行動させる味方を選んで！" : "★対象を選んで！（敵：攻撃 / 味方：回復）";
                guide.className = "text-yellow-400 text-[11px] mb-2 animate-pulse";
            } else {
                guide.innerText = "相手の行動を待機中...";
                guide.className = "text-gray-500 text-[10px] mb-2";
            }
            
            const renderCard = (c, idx, isEnemy) => {
                const div = document.createElement('div');
                const isDead = c.currentHp <= 0;
                const isSelectedActor = !isEnemy && selectedActorIdx === idx;
                
                div.className = `w-20 p-1 bg-gray-800 border-2 ${isDead ? 'opacity-30 border-gray-900' : 'border-gray-500'} text-[10px] text-center rounded transition-all`;
                
                if (isSelectedActor) div.classList.add('actor-glow', 'scale-110', 'z-20');

                if (!isDead && isMyTurn) {
                    div.classList.add('cursor-pointer');
                    div.onclick = () => {
                        if (!isEnemy && selectedActorIdx === -1) {
                            selectedActorIdx = idx;
                            updateBattleUI();
                        } else if (selectedActorIdx !== -1) {
                            if (battleMode === 'multi') sendAction(selectedActorIdx, idx, isEnemy);
                            else handleSoloAction(selectedActorIdx, idx, isEnemy);
                            selectedActorIdx = -1;
                        }
                    };
                    if (selectedActorIdx === -1 && !isEnemy) div.classList.add('target-glow');
                    if (selectedActorIdx !== -1) div.classList.add('target-glow');
                }

                const roleIcon = c.type === 'healer' ? '💖 癒' : '⚔️ 攻';
                div.innerHTML = `<span class="rank-${c.rank} font-bold">RANK ${c.rank}</span><br>${c.name}<br>${roleIcon}<br>HP:${Math.max(0, Math.floor(c.currentHp))}`;
                return div;
            };
            selectedTeam.forEach((c, i) => pUI.appendChild(renderCard(c, i, false)));
            enemies.forEach((c, i) => eUI.appendChild(renderCard(c, i, true)));
        }

        function handleSoloAction(aIdx, tIdx, isEnemy) {
            isMyTurn = false;
            const actor = selectedTeam[aIdx];
            const target = isEnemy ? enemies[tIdx] : selectedTeam[tIdx];
            
            if (actor.type === 'healer' && actor.mp > 0) {
                target.currentHp = Math.min(target.maxHp, target.currentHp + actor.atk);
                actor.mp--; log(`${actor.name}が${target.name}を癒した！`);
            } else {
                target.currentHp = Math.max(0, target.currentHp - actor.atk);
                log(`${actor.name}が${target.name}を攻撃！`);
            }
            currentTurnCount++;
            updateBattleUI();
            
            setTimeout(() => {
                if (!checkWinCondition()) {
                    const aliveEnemies = enemies.filter(c => c.currentHp > 0);
                    if (aliveEnemies.length > 0) {
                        const eActor = aliveEnemies[rand(aliveEnemies.length)];
                        const targetPlayer = selectedTeam.filter(c => c.currentHp > 0)[rand(selectedTeam.filter(c => c.currentHp > 0).length)];
                        if (targetPlayer) {
                            targetPlayer.currentHp = Math.max(0, targetPlayer.currentHp - eActor.atk);
                            log(`敵の${eActor.name}の攻撃！`);
                        }
                    }
                    updateBattleUI();
                    setTimeout(startSoloTurn, 600);
                }
            }, 600);
        }

        function log(msg) { 
            const l = document.getElementById('battle-log'); 
            if (!l) return;
            const entry = document.createElement('div');
            entry.className = "border-l-2 border-yellow-500 pl-2 mb-1 text-[10px]";
            entry.innerText = msg;
            l.appendChild(entry);
            l.scrollTop = l.scrollHeight; 
        }

        async function finishBattle(isWin) {
            isMyTurn = false; 
            document.getElementById('battle-finish-btn').classList.remove('hidden');
            if (isWin) { winCount++; totalCoins += 50; log("勝利！ 🪙+50"); }
            else { winCount = 0; log("敗北..."); }
            await saveUserData();
            if (unsubscribeRoom) unsubscribeRoom();
        }

        window.resetGame = () => { 
            showScreen('start');
            if (gameLoop) cancelAnimationFrame(gameLoop);
        };

        function handleMove(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const ratio = canvas.width / rect.width;
            targetX = Math.max(0, Math.min(canvas.width - 40, (clientX - rect.left) * ratio - 20));
        }

        canvas.addEventListener('touchstart', handleMove, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('mousedown', handleMove);
        canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) handleMove(e); });

        window.onload = () => showScreen('start');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { font-family: 'DotGothic16', sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        #ui-container { user-select: none; }
        canvas { display: block; margin: 0 auto; background: #111; border: 4px solid #333; max-width: 100%; height: auto; touch-action: none; }
        .rank-S { color: #facc15; } .rank-A { color: #f87171; } .rank-B { color: #60a5fa; }
        .target-glow { animation: glow 1s infinite alternate; }
        .actor-glow { border-color: #facc15 !important; box-shadow: 0 0 15px #facc15; }
        @keyframes glow { from { border-color: #555; } to { border-color: #fff; box-shadow: 0 0 8px #fff; } }
        .hidden { display: none !important; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2">
    <div id="ui-container" class="w-full max-md">
        <div class="flex flex-col mb-2 px-2">
            <div class="flex justify-between items-center">
                <h1 class="text-lg text-yellow-400 font-bold">QUEST & BATTLE</h1>
                <div id="top-score" class="text-[10px] bg-gray-800 px-2 py-1 rounded">WINS: 0 | 🪙 0</div>
            </div>
            <div id="player-title" onclick="window.openTitles()" class="text-[10px] text-gray-400 cursor-pointer hover:text-white transition-colors underline decoration-dotted">🐣駆け出し冒険者 (称号一覧)</div>
        </div>
        
        <div id="game-container" class="relative">
            <canvas id="gameCanvas" width="360" height="500"></canvas>
            
            <div id="screen-start" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 p-6 z-10 text-center">
                <input id="username-input" type="text" maxlength="10" placeholder="冒険者の名前" class="w-full p-2 text-black rounded text-sm text-center mb-6">
                <div class="grid grid-cols-1 gap-3 w-full mb-8">
                    <button onclick="window.openDifficultySelect()" class="p-4 bg-green-700 rounded-lg border-2 border-green-400 font-bold">クエストへ</button>
                    <button onclick="window.goToBattleMode()" class="p-4 bg-red-700 rounded-lg border-2 border-red-400 font-bold">バトル・編成</button>
                    <button onclick="window.openShop()" class="p-2 bg-yellow-700 rounded-lg border-2 border-yellow-400 font-bold text-sm">ショップ（強化）</button>
                </div>
            </div>

            <div id="screen-titles" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/95 p-6 z-20">
                <h2 class="text-lg mb-4 text-yellow-400 font-bold">称号コレクション</h2>
                <div id="title-list" class="w-full flex flex-col bg-gray-900/50 rounded p-2 overflow-y-auto max-h-80 border border-gray-700"></div>
                <button onclick="window.resetGame()" class="mt-6 px-8 py-2 bg-gray-700 rounded text-sm">戻る</button>
            </div>

            <div id="screen-difficulty" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90 p-6 z-10">
                <h2 class="text-lg mb-6 text-green-400 text-center">難易度を選択</h2>
                <div class="flex flex-col gap-4 w-full">
                    <button onclick="window.startQuest(0)" class="p-3 bg-blue-900 border border-blue-400 rounded">EASY</button>
                    <button onclick="window.startQuest(1)" class="p-3 bg-yellow-900 border border-yellow-400 rounded">NORMAL</button>
                    <button onclick="window.startQuest(2)" class="p-3 bg-red-900 border border-red-400 rounded">HARD</button>
                    <button onclick="window.resetGame()" class="mt-4 p-2 text-sm text-gray-400 underline">戻る</button>
                </div>
            </div>

            <div id="screen-gacha" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90 p-4 z-10">
                <h2 class="text-xl mb-4 text-green-400">クエスト完了！</h2>
                <div id="quest-coins" class="text-yellow-400 mb-4 text-sm font-bold">獲得コイン: +0</div>
                <div id="gacha-result" class="flex flex-wrap justify-center gap-2 mb-6"></div>
                <button onclick="window.goToBattleMode()" class="w-full py-3 bg-blue-600 rounded font-bold">編成へ</button>
            </div>

            <div id="screen-shop" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/95 p-4 z-10">
                <h2 class="text-lg mb-4 text-yellow-400 font-bold text-center">強化ショップ</h2>
                <div id="shop-items" class="flex flex-col gap-3 w-full mb-6 overflow-y-auto max-h-64 px-2"></div>
                <button onclick="window.resetGame()" class="w-full py-2 bg-gray-600 rounded text-sm">戻る</button>
            </div>

            <div id="screen-formation" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/95 p-4 z-10">
                <h2 class="text-lg mb-2 text-blue-300 font-bold text-center">チーム編成 (最大3)</h2>
                <div id="collection-list" class="grid grid-cols-3 gap-2 w-full max-h-48 overflow-y-auto mb-4 bg-gray-900 p-2 border border-gray-600 rounded"></div>
                <div class="bg-gray-800 p-3 rounded mb-4 w-full border border-gray-600">
                    <div class="flex justify-around text-[10px] mb-3">
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="auto" checked> AUTO</label>
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="manual"> SOLO</label>
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="multi"> MULTI</label>
                    </div>
                    <input id="room-id-input" type="text" placeholder="ルームキー" class="w-full p-1 text-black text-[10px] rounded text-center">
                </div>
                <div class="flex gap-2 w-full">
                    <button onclick="window.resetGame()" class="flex-1 py-2 bg-gray-600 rounded text-sm">戻る</button>
                    <button id="battle-btn" onclick="window.startBattleAction()" class="flex-[2] py-2 bg-red-600 font-bold rounded text-sm disabled:opacity-50">バトル開始</button>
                </div>
            </div>

            <div id="screen-battle" class="absolute inset-0 hidden flex flex-col items-center justify-between bg-black/80 py-4 z-10">
                <div id="battle-header" class="text-center text-yellow-400 text-[10px] font-bold"></div>
                <div class="flex flex-col gap-1 w-full px-2 items-center">
                    <div id="battle-guide"></div>
                    <div id="enemy-team-ui" class="flex justify-center gap-2"></div>
                    <div class="text-[9px] text-gray-500 my-2">VS</div>
                    <div id="player-team-ui" class="flex justify-center gap-2"></div>
                </div>
                <div id="battle-log" class="h-24 overflow-y-auto w-full px-3 text-gray-200 bg-black/60 py-2 text-[10px]"></div>
                <button id="battle-finish-btn" onclick="window.resetGame()" class="hidden mx-auto px-10 py-2 bg-yellow-500 text-black font-bold rounded">戻る</button>
            </div>

            <div id="screen-matching" class="absolute inset-0 hidden flex items-center justify-center bg-black/90 z-20">
                <div class="animate-pulse text-yellow-400">マッチング中...</div>
            </div>
        </div>
    </div>
</body>
</html>
