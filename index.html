<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Get & Battle - Dual Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Setup ---
        // APIキーは空文字列に設定します。環境側で安全に注入されます。
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", 
            authDomain: "my-action-battle.firebaseapp.com",
            projectId: "my-action-battle",
            storageBucket: "my-action-battle.firebasestorage.app",
            messagingSenderId: "1078959278482",
            appId: "1:1078959278482:web:546f3aa44c451c426e994b"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "my-battle-app-v3";

        // --- Game State & Variables ---
        let user = null;
        let userName = "Player";
        let winCount = 0;
        let leaderboard = [];

        let gameState = 'start';
        let playerX = 160;
        let fallSpeedLevel = 1;
        let collectedCards = [];
        let obstacles = [];
        let items = [];
        let myCharacters = JSON.parse(localStorage.getItem('myChars')) || [];
        let selectedTeam = [];
        let enemies = [];
        let gameLoop;
        let frameCount = 0;
        let battleMode = 'auto'; 
        let isMyTurn = false;

        // Turn Management
        let currentTurnCount = 0;
        const MAX_TURNS = 20;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CHAR_NAMES = ["Knight", "Mage", "Thief", "Dragon", "Elf", "Ogre", "Slime", "Hero", "Priest", "Angel"];
        const RANKS = ["B", "B", "B", "B", "A", "A", "S"];

        const screens = {
            start: document.getElementById('screen-start'),
            gacha: document.getElementById('screen-gacha'),
            formation: document.getElementById('screen-formation'),
            battle: document.getElementById('screen-battle')
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => { user = u; });
        initAuth();

        function rand(n) { return Math.floor(Math.random() * n); }
        
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s && s.classList.add('hidden'));
            if (screenName && screens[screenName]) {
                screens[screenName].classList.remove('hidden');
                gameState = screenName;
            }
            if (screenName === 'start') updateLeaderboardUI();
            if (screenName === 'formation') renderCollection();
        }

        function createCharacter(rank, ownerName = userName) {
            const name = CHAR_NAMES[rand(CHAR_NAMES.length)];
            const isHealer = name === "Priest" || name === "Angel" || (rank === 'S' && rand(3) === 0);
            let hp, atk;
            if (rank === 'S') { hp = 150 + rand(50); atk = 30 + rand(10); }
            else if (rank === 'A') { hp = 100 + rand(30); atk = 20 + rand(10); }
            else { hp = 60 + rand(20); atk = 10 + rand(10); }

            return { 
                id: Math.random().toString(36).substr(2, 9), 
                name, rank, hp, maxHp: hp, atk, owner: ownerName,
                type: isHealer ? 'healer' : 'attacker'
            };
        }

        // --- QUEST MODE ---
        window.setSpeed = (lv) => {
            fallSpeedLevel = lv;
            document.querySelectorAll('.speed-btn').forEach((btn, i) => {
                btn.className = i === lv ? 'speed-btn px-3 py-1 bg-yellow-500 text-black text-xs font-bold rounded' : 'speed-btn px-3 py-1 bg-gray-700 text-white text-xs rounded';
            });
        };

        window.startQuest = () => {
            const nameInput = document.getElementById('username-input');
            if (nameInput.value.trim()) userName = nameInput.value.trim();
            showScreen(null); 
            gameState = 'playing';
            playerX = canvas.width / 2 - 20;
            collectedCards = [];
            obstacles = [];
            items = [];
            frameCount = 0;
            if (gameLoop) cancelAnimationFrame(gameLoop);
            gameLoop = requestAnimationFrame(update);
        };

        function update() {
            if (gameState !== 'playing') return;
            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const baseSpeed = 3 + (fallSpeedLevel * 2);

            if (frameCount % Math.max(20, 60 - (fallSpeedLevel * 15)) === 0) {
                const isBomb = rand(5) === 0;
                obstacles.push({ x: rand(canvas.width - 30), y: -40, w: 30, h: 30, type: isBomb ? 'bomb' : 'block' });
            }
            if (frameCount % 100 === 0) items.push({ x: rand(canvas.width - 30), y: -40, rank: RANKS[rand(RANKS.length)] });

            ctx.fillStyle = '#4ade80'; ctx.fillRect(playerX, 420, 40, 40);
            ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.fillText(userName, playerX + 20, 415);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i]; o.y += baseSpeed;
                if (o.type === 'bomb') {
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(o.x+15, o.y+15, 15, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#f59e0b'; ctx.fillRect(o.x+12, o.y-5, 6, 10);
                } else {
                    ctx.fillStyle = '#f87171'; ctx.fillRect(o.x, o.y, o.w, o.h);
                }
                if (playerX < o.x + 30 && playerX + 40 > o.x && 420 < o.y + 30 && 460 > o.y) {
                    if (o.type === 'bomb') { if (collectedCards.length > 0) collectedCards.pop(); obstacles.splice(i, 1); } 
                    else { endQuest(); return; }
                }
                if (o.y > canvas.height) obstacles.splice(i, 1);
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i]; item.y += baseSpeed * 0.8;
                ctx.fillStyle = item.rank === 'S' ? '#facc15' : (item.rank === 'A' ? '#f87171' : '#60a5fa');
                ctx.fillRect(item.x, item.y, 35, 45);
                ctx.strokeStyle = "#fff"; ctx.strokeRect(item.x, item.y, 35, 45);
                ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
                ctx.fillText(`RANK`, item.x + 17, item.y + 15);
                ctx.font = "bold 16px Arial"; ctx.fillText(item.rank, item.x + 17, item.y + 35);

                if (playerX < item.x + 35 && playerX + 40 > item.x && 420 < item.y + 45 && 460 > item.y) {
                    collectedCards.push(item.rank); items.splice(i, 1);
                } else if (item.y > canvas.height) items.splice(i, 1);
            }

            ctx.textAlign = 'left'; ctx.fillStyle = '#fff'; ctx.font = '16px DotGothic16';
            ctx.fillText(`Cards: ${collectedCards.length}`, 10, 25);
            ctx.fillText(`Time: ${Math.floor((1200 - frameCount) / 60)}`, 280, 25);

            if (frameCount >= 1200) endQuest(); else gameLoop = requestAnimationFrame(update);
        }

        function endQuest() {
            cancelAnimationFrame(gameLoop);
            showGacha();
        }

        function showGacha() {
            showScreen('gacha');
            const resultDiv = document.getElementById('gacha-result');
            resultDiv.innerHTML = '';
            if (collectedCards.length === 0) collectedCards.push('B');
            collectedCards.forEach(rank => {
                const char = createCharacter(rank);
                myCharacters.push(char);
                const card = document.createElement('div');
                card.className = `p-2 bg-gray-800 border-2 border-gray-600 w-20 text-center text-[10px] rank-${rank} rounded shadow-lg`;
                card.innerHTML = `<span class="font-bold text-xs">RANK ${rank}</span><br>${char.name}<br>${char.type === 'healer' ? 'HEAL' : 'ATK'}:${char.atk}`;
                resultDiv.appendChild(card);
            });
            localStorage.setItem('myChars', JSON.stringify(myCharacters));
        }

        // --- BATTLE MODE ---
        window.goToBattleMode = () => {
            const nameInput = document.getElementById('username-input');
            if (nameInput.value.trim()) userName = nameInput.value.trim();
            showScreen('formation');
        };

        function renderCollection() {
            const list = document.getElementById('collection-list');
            list.innerHTML = '';
            myCharacters.forEach(char => {
                const isSelected = selectedTeam.some(t => t.id === char.id);
                const item = document.createElement('div');
                item.className = `p-1 cursor-pointer border-2 ${isSelected ? 'border-yellow-400 bg-gray-700' : 'border-gray-800 bg-gray-900'} text-[10px] rounded`;
                item.innerHTML = `<span class="rank-${char.rank} font-bold">RANK ${char.rank}</span><br>${char.name} (${char.type === 'healer' ? '癒' : '攻'})<br>HP:${char.hp}<br>ATK:${char.atk}`;
                item.onclick = () => {
                    const idx = selectedTeam.findIndex(t => t.id === char.id);
                    if (idx > -1) selectedTeam.splice(idx, 1);
                    else if (selectedTeam.length < 3) selectedTeam.push(char);
                    renderCollection();
                };
                list.appendChild(item);
            });
            document.getElementById('battle-btn').disabled = selectedTeam.length === 0;
        }

        window.autoForm = () => {
            selectedTeam = [...myCharacters].sort((a, b) => (b.atk + b.hp) - (a.atk + a.hp)).slice(0, 3);
            renderCollection();
        };

        window.startBattleAction = async () => {
            currentTurnCount = 0;
            battleMode = document.querySelector('input[name="battleMode"]:checked').value;
            showScreen('battle');
            runSoloBattle();
        };

        function runSoloBattle() {
            document.getElementById('battle-finish-btn').classList.add('hidden');
            document.getElementById('battle-log').innerHTML = '';
            enemies = [createCharacter('B', 'CPU'), createCharacter('A', 'CPU'), createCharacter('S', 'CPU')].slice(0, selectedTeam.length);
            selectedTeam.forEach(c => c.hp = c.maxHp);
            if (battleMode === 'auto') runAutoBattle();
            else startSoloPlayerTurn();
        }

        function checkWinCondition() {
            const pAlive = selectedTeam.filter(c => c.hp > 0);
            const eAlive = enemies.filter(c => c.hp > 0);

            // 1. 全滅判定
            if (eAlive.length === 0) { finishBattle(true); return true; }
            if (pAlive.length === 0) { finishBattle(false); return true; }

            // 2. ターン制限判定（泥試合防止）
            if (currentTurnCount >= MAX_TURNS) {
                log("--- タイムアップ！ ---");
                if (pAlive.length > eAlive.length) finishBattle(true);
                else if (pAlive.length < eAlive.length) finishBattle(false);
                else {
                    const pTotal = pAlive.reduce((s, c) => s + c.hp, 0);
                    const eTotal = eAlive.reduce((s, c) => s + c.hp, 0);
                    finishBattle(pTotal >= eTotal);
                }
                return true;
            }
            return false;
        }

        function runAutoBattle() {
            const turnInterval = setInterval(() => {
                if (checkWinCondition()) { clearInterval(turnInterval); return; }
                
                currentTurnCount++;
                const isP = rand(2) === 0;
                const side = isP ? selectedTeam : enemies;
                const aliveSide = side.filter(c => c.hp > 0);
                const actor = aliveSide[rand(aliveSide.length)];
                
                if (actor.type === 'healer') {
                    const target = aliveSide[rand(aliveSide.length)];
                    target.hp = Math.min(target.maxHp, target.hp + actor.atk);
                    log(`${isP ? userName : 'CPU'}の${actor.name}が回復！`);
                } else {
                    const target = (isP ? enemies : selectedTeam).filter(c => c.hp > 0)[rand((isP ? enemies : selectedTeam).filter(c => c.hp > 0).length)];
                    target.hp -= actor.atk;
                    log(`${isP ? userName : 'CPU'}の${actor.name}が攻撃！`);
                }
                updateSoloUI();
            }, 800);
        }

        function startSoloPlayerTurn() {
            if (checkWinCondition()) return;
            isMyTurn = true; log(`ターン ${currentTurnCount}/${MAX_TURNS}: 対象を選択`); updateSoloUI();
        }

        function updateSoloUI() {
            const pUI = document.getElementById('player-team-ui');
            const eUI = document.getElementById('enemy-team-ui');
            pUI.innerHTML = ''; eUI.innerHTML = '';
            document.getElementById('battle-header').innerText = `TURN ${currentTurnCount} / ${MAX_TURNS}`;

            const createCardUI = (c, isEnemy) => {
                const div = document.createElement('div');
                const isDead = c.hp <= 0;
                div.className = `w-20 p-1 bg-gray-800 border-2 ${isDead ? 'opacity-30 border-gray-900' : 'border-gray-500'} text-[10px] text-center rounded`;
                if (!isDead && isMyTurn) {
                    div.classList.add('target-glow');
                    div.onclick = () => {
                        currentTurnCount++;
                        const aliveP = selectedTeam.filter(c => c.hp > 0);
                        const actor = aliveP[rand(aliveP.length)];
                        if ((actor.type === 'healer' && isEnemy) || (actor.type === 'attacker' && !isEnemy)) return;
                        isMyTurn = false;
                        if (actor.type === 'healer') { c.hp = Math.min(c.maxHp, c.hp + actor.atk); log(`味方を回復！ +${actor.atk}`); } 
                        else { c.hp -= actor.atk; log(`敵に攻撃！ -${actor.atk}`); }
                        updateSoloUI();
                        setTimeout(() => {
                            if (!checkWinCondition()) {
                                const eAlive = enemies.filter(c => c.hp > 0);
                                const eActor = eAlive[rand(eAlive.length)];
                                if (eActor.type === 'healer') {
                                    const t = eAlive[rand(eAlive.length)]; t.hp = Math.min(t.maxHp, t.hp + eActor.atk); log(`敵CPUが回復！`);
                                } else {
                                    const t = selectedTeam.filter(c => c.hp > 0)[rand(selectedTeam.filter(c => c.hp > 0).length)];
                                    t.hp -= eActor.atk; log(`敵CPUが反撃！`);
                                }
                                updateSoloUI(); setTimeout(startSoloPlayerTurn, 600);
                            }
                        }, 600);
                    };
                }
                div.innerHTML = `<span class="rank-${c.rank} font-bold text-[11px]">RANK ${c.rank}</span><br>${c.name}<br>HP:${Math.max(0, Math.floor(c.hp))}<br>ATK:${c.atk}`;
                return div;
            };
            selectedTeam.forEach(c => pUI.appendChild(createCardUI(c, false)));
            enemies.forEach(c => eUI.appendChild(createCardUI(c, true)));
        }

        function log(msg) { const l = document.getElementById('battle-log'); l.innerHTML += msg + '<br>'; l.scrollTop = l.scrollHeight; }

        function finishBattle(isWin) {
            isMyTurn = false; document.getElementById('battle-finish-btn').classList.remove('hidden');
            if (isWin) { winCount++; document.getElementById('top-score').innerText = `WINS: ${winCount}`; log("VICTORY!"); }
            else { winCount = 0; document.getElementById('top-score').innerText = `WINS: 0`; log("DEFEAT..."); }
        }

        function updateLeaderboardUI() {
            // リーダーボード表示（省略可）
        }

        window.resetGame = () => { showScreen('start'); ctx.clearRect(0, 0, canvas.width, canvas.height); };

        window.addEventListener('keydown', e => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft') playerX = Math.max(0, playerX - 30);
            if (e.key === 'ArrowRight') playerX = Math.min(canvas.width - 40, playerX + 30);
        });
        canvas.addEventListener('touchstart', e => {
            if (gameState !== 'playing') return;
            const tx = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            playerX = tx < canvas.width / 2 ? Math.max(0, playerX - 45) : Math.min(canvas.width - 40, playerX + 45);
        });

        window.onload = () => showScreen('start');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { font-family: 'DotGothic16', sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #111; border: 4px solid #333; }
        .rank-S { color: #facc15; text-shadow: 0 0 5px #facc15; }
        .rank-A { color: #f87171; text-shadow: 0 0 5px #f87171; }
        .rank-B { color: #60a5fa; text-shadow: 0 0 5px #60a5fa; }
        .target-glow { animation: glow 1s infinite alternate; }
        @keyframes glow { from { border-color: #f00; } to { border-color: #fff; box-shadow: 0 0 10px #fff; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div id="ui-container" class="w-full max-w-md p-2">
        <div class="flex justify-between w-full items-center mb-2 px-2">
            <h1 class="text-lg text-yellow-400 italic">QUEST & BATTLE DUAL</h1>
            <div id="top-score" class="text-xs bg-gray-800 px-2 py-1 rounded">WINS: 0</div>
        </div>
        <div id="game-container" class="relative">
            <canvas id="gameCanvas" width="360" height="500"></canvas>
            <!-- START -->
            <div id="screen-start" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 p-6">
                <input id="username-input" type="text" maxlength="10" placeholder="Player Name" class="w-full p-2 text-black rounded text-sm text-center mb-6">
                <div class="grid grid-cols-2 gap-4 w-full mb-8">
                    <button onclick="startQuest()" class="flex flex-col items-center p-4 bg-green-700 hover:bg-green-600 rounded-lg border-2 border-green-400">
                        <span class="text-2xl mb-1">🏃‍♂️</span>
                        <span class="font-bold">QUEST</span>
                    </button>
                    <button onclick="goToBattleMode()" class="flex flex-col items-center p-4 bg-red-700 hover:bg-red-600 rounded-lg border-2 border-red-400">
                        <span class="text-2xl mb-1">⚔️</span>
                        <span class="font-bold">BATTLE</span>
                    </button>
                </div>
                <div class="w-full text-center bg-gray-900 p-3 rounded mb-4">
                    <p class="text-[10px] text-gray-400 mb-2">DIFFICULTY</p>
                    <div class="flex justify-center gap-2">
                        <button onclick="setSpeed(0)" class="speed-btn px-3 py-1 bg-gray-700 text-white text-xs rounded">EASY</button>
                        <button onclick="setSpeed(1)" class="speed-btn px-3 py-1 bg-yellow-500 text-black text-xs font-bold rounded">NORMAL</button>
                        <button onclick="setSpeed(2)" class="speed-btn px-3 py-1 bg-gray-700 text-white text-xs rounded">HARD</button>
                    </div>
                </div>
            </div>
            <!-- GACHA -->
            <div id="screen-gacha" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90">
                <h2 class="text-xl mb-4 text-green-400">CARDS OBTAINED!</h2>
                <div id="gacha-result" class="flex flex-wrap justify-center gap-2 mb-6 max-h-60 overflow-y-auto p-2"></div>
                <div class="flex gap-2">
                    <button onclick="resetGame()" class="px-6 py-2 bg-gray-600 text-white text-xs rounded">MENU</button>
                    <button onclick="goToBattleMode()" class="px-6 py-2 bg-blue-600 text-white text-xs rounded font-bold">TEAM SETTINGS</button>
                </div>
            </div>
            <!-- FORMATION -->
            <div id="screen-formation" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/90 p-4">
                <h2 class="text-lg mb-2 text-blue-300">BATTLE TEAM</h2>
                <div id="collection-list" class="grid grid-cols-3 gap-2 w-full max-h-48 overflow-y-auto mb-4 bg-gray-800 p-2 border border-gray-600"></div>
                <div class="bg-gray-700/50 p-2 rounded mb-4 w-full text-center">
                    <div class="flex justify-center gap-4 text-xs mb-2">
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="auto" checked> AUTO</label>
                        <label class="flex items-center gap-1"><input type="radio" name="battleMode" value="manual"> SOLO</label>
                    </div>
                </div>
                <div class="flex gap-2 w-full">
                    <button onclick="resetGame()" class="flex-1 py-2 bg-gray-600 text-white text-xs rounded">BACK</button>
                    <button onclick="autoForm()" class="flex-1 py-2 bg-blue-800 text-white text-xs rounded">AUTO</button>
                    <button id="battle-btn" onclick="startBattleAction()" class="flex-1 py-2 bg-red-600 text-white font-bold text-xs rounded">FIGHT!</button>
                </div>
            </div>
            <!-- BATTLE -->
            <div id="screen-battle" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-black/80">
                <div id="battle-header" class="text-center mb-2 text-yellow-400 text-sm font-bold"></div>
                <div class="flex flex-col gap-2 w-full px-2">
                    <div id="enemy-team-ui" class="flex justify-center gap-2"></div>
                    <div class="text-center text-white/20 text-xs font-bold py-1">VS</div>
                    <div id="player-team-ui" class="flex justify-center gap-2"></div>
                </div>
                <div id="battle-log" class="text-[9px] h-20 overflow-y-auto w-full px-4 text-gray-400 mt-4 bg-black/40 py-2 border-y border-white/10"></div>
                <button id="battle-finish-btn" onclick="resetGame()" class="hidden mt-4 px-8 py-2 bg-yellow-500 text-black font-bold rounded">BACK TO MENU</button>
            </div>
        </div>
    </div>
</body>
</html>
